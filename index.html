<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Computational Knowledge Engine</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Computational Knowledge Engine</h1>
      <p class="subtitle">
        Enter a natural-language math query (e.g., “Integrate x^2”, “Solve x^2 - 4 = 0”, “Plot sin(x)”).
      </p>

      <section class="input-card">
        <label for="query">Query</label>
        <textarea id="query" rows="3" placeholder="Type your query..."></textarea>
        <div class="actions">
          <button id="runBtn">Run</button>
          <button id="exampleBtn" class="secondary">Load Example</button>
        </div>
      </section>

      <section class="results-grid">
        <article class="card">
          <h2>Interpretation</h2>
          <pre id="interpretation">—</pre>
          <p id="didYouMean" class="hint"></p>
        </article>

        <article class="card">
          <h2>Result</h2>
          <pre id="exact">Exact: —</pre>
          <pre id="numeric">Numeric: —</pre>
        </article>

        <article class="card">
          <h2>Step-by-step Logic</h2>
          <ol id="steps"></ol>
        </article>

        <article class="card">
          <h2>Metadata</h2>
          <pre id="metadata">{}</pre>
        </article>
      </section>

      <section class="card wide">
        <h2>Visualization</h2>
        <canvas id="plotCanvas" width="900" height="320" aria-label="Function plot"></canvas>
        <p class="hint">Plot renders for visualization queries.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
